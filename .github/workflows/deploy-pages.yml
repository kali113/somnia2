name: Deploy Next.js site to Pages

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

defaults:
  run:
    shell: bash

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve contract address
        id: contract
        shell: bash
        run: |
          set -euo pipefail

          address="${{ vars.NEXT_PUBLIC_PIXEL_ROYALE_ADDRESS }}"

          if [[ -z "$address" ]] && [[ -f contracts/deployments/somnia-shannon-50312.json ]]; then
            address="$(node -e "const fs=require('fs'); try { const d=JSON.parse(fs.readFileSync('contracts/deployments/somnia-shannon-50312.json','utf8')); process.stdout.write((d?.contract?.address || '').trim()) } catch (_) {}")"
          fi

          if [[ ! "$address" =~ ^0x[a-fA-F0-9]{40}$ ]] || [[ "${address,,}" == "0x0000000000000000000000000000000000000000" ]]; then
            echo "::error::Missing contract address for Pages build. Set repo variable NEXT_PUBLIC_PIXEL_ROYALE_ADDRESS or commit contracts/deployments/somnia-shannon-50312.json with contract.address."
            exit 1
          fi

          echo "address=$address" >> "$GITHUB_OUTPUT"
          echo "Resolved contract address: ${address:0:8}...${address: -4}"

      - name: Build
        run: pnpm run build
        env:
          NEXT_PUBLIC_PIXEL_ROYALE_ADDRESS: ${{ steps.contract.outputs.address }}
          NEXT_PUBLIC_GAME_CONTRACT_ADDRESS: ${{ steps.contract.outputs.address }}
          NEXT_PUBLIC_SOMNIA_RPC_URL: https://dream-rpc.somnia.network
          NEXT_PUBLIC_SOMNIA_WS_URL: wss://dream-rpc.somnia.network/ws
          NEXT_PUBLIC_SOMNIA_EXPLORER_URL: https://shannon-explorer.somnia.network/
          NEXT_PUBLIC_SOMNIA_FAUCET_URL: https://cloud.google.com/application/web3/faucet/somnia/shannon

      - name: Disable Jekyll processing
        run: touch ./out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
