name: Deploy Next.js site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          NEXT_PUBLIC_PIXEL_ROYALE_ADDRESS: ${{ vars.NEXT_PUBLIC_PIXEL_ROYALE_ADDRESS }}
          NEXT_PUBLIC_SOMNIA_RPC_URL: https://dream-rpc.somnia.network
          NEXT_PUBLIC_SOMNIA_WS_URL: wss://dream-rpc.somnia.network/ws
          NEXT_PUBLIC_SOMNIA_EXPLORER_URL: https://shannon-explorer.somnia.network/
          NEXT_PUBLIC_SOMNIA_FAUCET_URL: https://cloud.google.com/application/web3/faucet/somnia/shannon

      - name: Disable Jekyll processing
        run: touch ./out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
