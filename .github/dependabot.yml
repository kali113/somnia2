version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
    groups:
      github-actions-non-major:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "05:15"
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: deps
      include: scope
    groups:
      root-non-major:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /server
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "05:30"
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - server
    commit-message:
      prefix: deps
      include: scope
    groups:
      server-non-major:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
